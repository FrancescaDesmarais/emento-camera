<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
    }

    .screen {
      display: none;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .screen.active {
      display: flex;
    }

    /* ── Screen 1: Start ── */

    .app-name {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888888;
    }

    .camera-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: #228B22;
      border: none;
      cursor: pointer;
      margin-bottom: 28px;
      transition: background 0.15s, transform 0.1s;
    }

    .camera-btn:active {
      background: #1a6e1a;
      transform: scale(0.97);
    }

    /* Camera icon — built in SVG */
    .camera-btn svg {
      width: 56px;
      height: 56px;
    }

    .start-label {
      font-size: 17px;
      font-weight: 500;
      color: #111111;
      text-align: center;
      line-height: 1.4;
      max-width: 220px;
    }

    /* Hidden file input */
    #camera-input {
      display: none;
    }

    /* ── Screen 3: Processing ── */

    .processing-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #e0e0e0;
      border-top-color: #228B22;
      animation: spin 1s linear infinite;
      margin-bottom: 32px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .processing-title {
      font-size: 20px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 10px;
      text-align: center;
    }

    .processing-sub {
      font-size: 14px;
      color: #888888;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Start -->
  <div class="screen active" id="screen-start">
    <span class="app-name">Emento</span>

    <button class="camera-btn" id="camera-trigger" aria-label="Add information">
      <!-- Camera + icon -->
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Camera body -->
        <rect x="4" y="16" width="48" height="32" rx="5" fill="white" opacity="0.15"/>
        <rect x="4" y="16" width="48" height="32" rx="5" stroke="white" stroke-width="3"/>
        <!-- Lens -->
        <circle cx="26" cy="32" r="9" stroke="white" stroke-width="3"/>
        <!-- Viewfinder bump -->
        <path d="M18 16v-4a3 3 0 013-3h8a3 3 0 013 3v4" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <!-- Plus symbol -->
        <line x1="44" y1="26" x2="44" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="30" x2="48" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>

    <p class="start-label">Add Information To Your Digital Care Guide</p>

    <input type="file" accept="image/*" capture="environment" id="camera-input" />
  </div>

  <!-- Screen 3: Processing -->
  <div class="screen" id="screen-processing">
    <div class="processing-icon"></div>
    <p class="processing-title">Analysing your note…</p>
    <p class="processing-sub">Reading the information and adding it to your care guide.</p>
  </div>

  <script>
    const trigger   = document.getElementById('camera-trigger');
    const input     = document.getElementById('camera-input');
    const screenStart      = document.getElementById('screen-start');
    const screenProcessing = document.getElementById('screen-processing');

    trigger.addEventListener('click', () => input.click());

    input.addEventListener('change', () => {
      if (input.files && input.files.length > 0) {
        screenStart.classList.remove('active');
        screenProcessing.classList.add('active');
      }
    });
  </script>

</body>
</html>
