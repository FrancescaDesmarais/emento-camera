<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
    }

    .screen {
      display: none;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      position: relative;
    }

    .screen.active {
      display: flex;
    }

    /* ── Screen 1: Start ── */

    .app-name {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888888;
    }

    .camera-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: #228B22;
      border: none;
      cursor: pointer;
      margin-bottom: 28px;
      transition: background 0.15s, transform 0.1s;
    }

    .camera-btn:active {
      background: #1a6e1a;
      transform: scale(0.97);
    }

    .camera-btn svg {
      width: 56px;
      height: 56px;
    }

    .start-label {
      font-size: 17px;
      font-weight: 500;
      color: #111111;
      text-align: center;
      line-height: 1.4;
      max-width: 220px;
    }

    #camera-input {
      display: none;
    }

    /* ── Screen 2: Processing ── */

    .processing-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #e0e0e0;
      border-top-color: #228B22;
      animation: spin 1s linear infinite;
      margin-bottom: 32px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .processing-title {
      font-size: 20px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 10px;
      text-align: center;
    }

    .processing-sub {
      font-size: 14px;
      color: #888888;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Screen 3: Result ── */

    .back-btn {
      position: absolute;
      top: 48px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: #228B22;
      padding: 4px 0;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    .result-content {
      width: 100%;
      align-self: flex-start;
      margin-top: 48px;
    }

    .result-type {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #228B22;
      margin-bottom: 8px;
    }

    .result-title {
      font-size: 22px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 24px;
    }

    .result-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 20px;
    }

    .result-row-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
    }

    .result-row-value {
      font-size: 16px;
      font-weight: 500;
      color: #111111;
      line-height: 1.4;
    }

    .result-note {
      margin-top: 32px;
      background: #f5f5f5;
      border-left: 3px solid #228B22;
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 13px;
      color: #555555;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Start -->
  <div class="screen active" id="screen-start">
    <span class="app-name">Emento</span>

    <button class="camera-btn" id="camera-trigger" aria-label="Add information">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="16" width="48" height="32" rx="5" fill="white" opacity="0.15"/>
        <rect x="4" y="16" width="48" height="32" rx="5" stroke="white" stroke-width="3"/>
        <circle cx="26" cy="32" r="9" stroke="white" stroke-width="3"/>
        <path d="M18 16v-4a3 3 0 013-3h8a3 3 0 013 3v4" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="44" y1="26" x2="44" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="30" x2="48" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>

    <p class="start-label">Add Information To Your Digital Care Guide</p>

    <input type="file" accept="image/*" capture="environment" id="camera-input" />
  </div>

  <!-- Screen 2: Processing -->
  <div class="screen" id="screen-processing">
    <div class="processing-icon"></div>
    <p class="processing-title">Analysing your note…</p>
    <p class="processing-sub">Reading the information and adding it to your care guide.</p>
  </div>

  <!-- Screen 3: Result -->
  <div class="screen" id="screen-result">
    <button class="back-btn" id="back-btn">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 4L6 9l5 5" stroke="#228B22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </button>

    <div class="result-content" id="result-content"></div>
  </div>

  <script>
    const trigger          = document.getElementById('camera-trigger');
    const input            = document.getElementById('camera-input');
    const screenStart      = document.getElementById('screen-start');
    const screenProcessing = document.getElementById('screen-processing');
    const screenResult     = document.getElementById('screen-result');
    const resultContent    = document.getElementById('result-content');
    const backBtn          = document.getElementById('back-btn');

    const results = [
      {
        type: 'Appointment Note',
        title: 'Surgery Department Details',
        rows: [
          { label: 'Department',  value: 'Orthopaedic Day Surgery — Level 3, Block C' },
          { label: 'Date',        value: 'Thursday 18 April 2026' },
          { label: 'Arrival Time', value: '7:00 AM' },
          { label: 'Operation Time', value: '9:30 AM (estimated)' },
          { label: 'Contact',     value: 'Ward 4B — ext. 3214' },
        ],
        note: 'This information has been added to your care guide under "Your Appointments".'
      },
      {
        type: 'Medication Schedule',
        title: 'Post-Surgery Pain Management',
        rows: [
          { label: 'Medication',  value: 'Paracetamol 1000mg + Ibuprofen 400mg' },
          { label: 'Morning',     value: '7:00 AM — with food' },
          { label: 'Midday',      value: '1:00 PM — with food' },
          { label: 'Evening',     value: '7:00 PM — with food' },
          { label: 'Note',        value: 'Do not exceed 4 doses in 24 hours' },
        ],
        note: 'This schedule has been added to your care guide under "Your Medications".'
      }
    ];

    let turn = 0;

    function showResult(data) {
      resultContent.innerHTML = `
        <p class="result-type">${data.type}</p>
        <h2 class="result-title">${data.title}</h2>
        <div class="divider"></div>
        ${data.rows.map(r => `
          <div class="result-row">
            <span class="result-row-label">${r.label}</span>
            <span class="result-row-value">${r.value}</span>
          </div>
        `).join('')}
        <div class="result-note">${data.note}</div>
      `;
    }

    trigger.addEventListener('click', () => input.click());

    input.addEventListener('change', () => {
      if (!input.files || input.files.length === 0) return;

      screenStart.classList.remove('active');
      screenProcessing.classList.add('active');

      setTimeout(() => {
        showResult(results[turn % 2]);
        turn++;
        screenProcessing.classList.remove('active');
        screenResult.classList.add('active');
        input.value = '';
      }, 2500);
    });

    backBtn.addEventListener('click', () => {
      screenResult.classList.remove('active');
      screenStart.classList.add('active');
    });
  </script>

</body>
</html>
